# Development overrides - adds hot reload and exposes all ports
services:
  api:
    build:
      target: builder
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DEBUG: "true"
      ENVIRONMENT: development
    volumes:
      - .:/app
    ports:
      - "8000:8000"

  worker:
    volumes:
      - .:/app

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
